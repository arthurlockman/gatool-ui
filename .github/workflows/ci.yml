name: CI

on:
  push:
    branches: [ main, beta ]
  pull_request:
    branches: [ main, beta ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Lint changed files (strict)
      if: github.event_name == 'pull_request'
      run: npm run lint:strict-changed

    - name: Test
      run: npm run test:ci
      env:
        CI: true

    - name: Coverage summary on Actions run page
      if: always()
      run: |
        if [ -f coverage/coverage-summary.json ]; then
          {
            echo "## Test coverage"
            echo ""
            echo "| Metric | Covered | Total | % |"
            echo "|---|---|---|---|"
            node -e "
              const t = require('./coverage/coverage-summary.json').total;
              for (const k of ['statements','branches','functions','lines']) {
                const m = t[k];
                console.log(\`| \${k} | \${m.covered} | \${m.total} | \${m.pct}% |\`);
              }
            "
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: MishaKav/jest-coverage-comment@main
      with:
        coverage-summary-path: ./coverage/coverage-summary.json
        title: Test coverage
        summary-title: Coverage summary
        hide-summary: false
        hide-comment: false

    - name: Run build
      run: npm run build
