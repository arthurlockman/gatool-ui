<h1>Home Component - Displaying 2019 Events</h1>
<button (click)="reload()">Reload Data</button>
<select (change)="onChange($event.target.value)" *ngIf="!!events">
  <option *ngFor="let event of events" value="{{event.code}}">{{event.name}}</option>
</select>

<ul *ngIf="!!teams">
  <li *ngFor="let team of teams">{{team.teamNumber}}</li>
</ul>
